[workspace]
authors = ["Pavailler <sebastien.pavailler@salomon.com>"]
channels = ["conda-forge"]
name = "python_training"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
marimo = "python -m marimo"
workshop = "python -m marimo edit notebooks/"

[dependencies]
pymc = ">=6.0.0,<7"
arviz = ">=1.1.0,<2"
arviz-stats = ">=1.1.0,<2"
arviz-plots = ">=1.1.0,<2"
plotly = ">=6.6.0,<7"
nutpie = ">=0.16.10,<0.17"
mcp = ">=1.27.1,<2"
polars = ">=1.40.1,<2"
preliz = ">=0.25.0,<0.26"
pymc-extras = ">=0.11.0,<0.12"
pydantic-ai = ">=1.96.1,<2"
altair = ">=6.1.0,<7"
pytensor = ">=3.0.2,<4"
tabulate = ">=0.9.0,<0.10"
patsy = ">=1.0.2,<2"

[pypi-dependencies]
marimo = ">=0.23.6, <0.24"
pybaseball = ">=2.2.7, <3"