[workspace]
authors = ["Pavailler <sebastien.pavailler@salomon.com>"]
channels = ["conda-forge"]
name = "python_training"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
marimo = "python -m marimo"
training = "python -m marimo edit"

[dependencies]
python = ">=3.11,<3.13"
numpy = "*"
pandas = "*"
matplotlib = "*"
polars = "*"
altair = "*"

[pypi-dependencies]
marimo = ">=0.23.6,<0.24"